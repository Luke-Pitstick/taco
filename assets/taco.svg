<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <!-- Taco shell (back layer) -->
  <path d="M20 130 Q100 20 180 130" fill="#F4A832" stroke="#D4891A" stroke-width="3" />

  <!-- Taco shell inner shadow -->
  <path d="M30 125 Q100 35 170 125" fill="#E89B28" stroke="none" />

  <!-- Lettuce (green, wavy) -->
  <path d="M35 115 Q50 90 65 108 Q80 85 95 105 Q110 82 125 105 Q140 85 155 108 Q165 92 170 115"
        fill="#6BBF47" stroke="#4A9E2F" stroke-width="1.5" />

  <!-- Tomato chunks -->
  <circle cx="60" cy="105" r="8" fill="#E74C3C" stroke="#C0392B" stroke-width="1" />
  <circle cx="105" cy="100" r="7" fill="#E74C3C" stroke="#C0392B" stroke-width="1" />
  <circle cx="145" cy="105" r="6" fill="#E74C3C" stroke="#C0392B" stroke-width="1" />

  <!-- Cheese (yellow, dripping) -->
  <path d="M45 118 Q55 105 65 115 Q75 100 90 112 Q100 98 110 110 Q120 100 130 112 Q140 102 150 115 Q158 108 160 118"
        fill="#FDDA5E" stroke="#E8C84A" stroke-width="1" />

  <!-- Meat -->
  <path d="M40 125 Q60 110 80 122 Q100 108 120 120 Q140 108 160 125"
        fill="#A0522D" stroke="#8B4513" stroke-width="1.5" />

  <!-- Taco shell front rim -->
  <path d="M20 130 Q100 115 180 130" fill="#F4A832" stroke="#D4891A" stroke-width="3" />

  <!-- Shell texture lines -->
  <path d="M40 128 Q60 70 70 125" fill="none" stroke="#D4891A" stroke-width="0.8" opacity="0.4" />
  <path d="M90 120 Q95 50 100 120" fill="none" stroke="#D4891A" stroke-width="0.8" opacity="0.4" />
  <path d="M130 125 Q140 65 155 128" fill="none" stroke="#D4891A" stroke-width="0.8" opacity="0.4" />

  <!-- Eyes -->
  <ellipse cx="78" cy="75" rx="10" ry="12" fill="white" stroke="#333" stroke-width="1.5" />
  <ellipse cx="122" cy="75" rx="10" ry="12" fill="white" stroke="#333" stroke-width="1.5" />
  <circle cx="80" cy="76" r="5" fill="#333" />
  <circle cx="124" cy="76" r="5" fill="#333" />
  <circle cx="82" cy="74" r="2" fill="white" />
  <circle cx="126" cy="74" r="2" fill="white" />

  <!-- Smile -->
  <path d="M85 90 Q100 105 115 90" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" />
</svg>
